version: "3.9"

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    env_file:
      - .env
    volumes:
      - ./backend/data:/app/data
    restart: unless-stopped

  # Frontend is served separately — see frontend/README.md
  # For a quick start, just open frontend/index.html in a browser
  # or run: cd frontend && npm run dev
